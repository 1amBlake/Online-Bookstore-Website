<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Website Bán Sách Nhóm 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-header">
            <h2><i class="fas fa-user-circle"></i> Đăng nhập</h2>
            <p>Chào mừng bạn quay lại NhaSach!</p>
        </div>

        <form class="login-form" action="">
            <div class="input-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập tên đăng nhập..." required>
            </div>

            <div class="input-group">
                <label for="password">Mật mã</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-primary btn-block">Đăng nhập</button>
            </div>

            <div class="login-footer">
                <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Quay lại Trang chủ</a>
            </div>
        </form>
    </div>
</body>
</html>
